# ============================================================
# MedSync — Continuous Integration Pipeline
# ============================================================
# Runs on every PR and push to main.
#
# Jobs:
#   1. build-java     — Maven build + test for all Java services (matrix)
#   2. build-python   — pip install + basic checks for ai-agent-service
#   3. build-frontend — npm ci + lint + build for React frontend
#   4. docker-build   — Verify all Dockerfiles build (push to main only)
# ============================================================

name: CI — Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==========================================================
  # Java Microservices — Maven Build + Test
  # ==========================================================
  build-java:
    name: "Java — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - patient-service
          - billing-service
          - analytics-service
          - appointment-service
          - api-gateway

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin_user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ matrix.service }}-${{ hashFiles(format('{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ matrix.service }}-
            ${{ runner.os }}-maven-

      - name: Build and test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn clean verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: admin_user
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_JPA_HIBERNATE_DDL_AUTO: update

  # ==========================================================
  # Python AI Agent Service
  # ==========================================================
  build-python:
    name: "Python — ai-agent-service"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ai-agent-service/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ai-agent-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ai-agent-service
        run: python -m pytest tests/ -v 2>/dev/null || echo "No tests found — skipping"

  # ==========================================================
  # React Frontend
  # ==========================================================
  build-frontend:
    name: "Frontend — React"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ==========================================================
  # Docker Build Verification (push to main only)
  # ==========================================================
  docker-build:
    name: "Docker — Build Verification"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-java, build-python, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        run: docker compose build --parallel
