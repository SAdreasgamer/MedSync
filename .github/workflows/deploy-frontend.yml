# ============================================================
# MedSync — Frontend Deployment Pipeline
# ============================================================
# Builds the React app and deploys to S3 + CloudFront.
# Triggered on push to main when frontend files change.
#
# Strategy: npm build → S3 sync → CloudFront invalidation
# ============================================================

name: Deploy — Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://${{ secrets.EC2_HOST }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy assets to S3 (with long cache)
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"

      - name: Deploy index.html to S3 (no cache)
        run: |
          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Post deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Frontend deployed to S3 and CloudFront cache invalidated"
          else
            echo "❌ Frontend deployment failed"
          fi
