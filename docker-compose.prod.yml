# ============================================================
# MedSync — Production Docker Compose Overrides
# ============================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or:    make prod
#
# This file overrides the base docker-compose.yml with:
#   - Nginx reverse proxy (only publicly exposed service)
#   - Memory and CPU limits for all containers
#   - No exposed ports on internal services
#   - Logging configuration with rotation
#   - Production restart policies
# ============================================================

services:
  # ============================================================
  # NGINX REVERSE PROXY (only public-facing service)
  # ============================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: pm-nginx
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ============================================================
  # INFRASTRUCTURE — Resource Limits
  # ============================================================
  postgres:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    deploy:
      resources:
        limits:
          memory: 400M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # JAVA MICROSERVICES — Resource Limits + No Exposed Ports
  # ============================================================
  auth-service:
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 220M
          cpus: "0.30"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  billing-service:
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 220M
          cpus: "0.30"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  patient-service:
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 220M
          cpus: "0.30"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  analytics-service:
