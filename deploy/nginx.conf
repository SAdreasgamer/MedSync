# ============================================================
# MedSync — Nginx Reverse Proxy Configuration
# ============================================================
# Sits in front of api-gateway, provides:
#   - SSL termination (HTTPS)
#   - HTTP → HTTPS redirect
#   - Rate limiting on AI agent endpoints
#   - WebSocket support for agent streaming
#   - Security headers
#   - Gzip compression
#   - CORS headers for React frontend
# ============================================================

# --- Rate Limiting Zones ---
# AI agent endpoints: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=agent_limit:10m rate=10r/s;
# General API: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# --- Upstream Backend ---
upstream api_backend {
    server api-gateway:4004;
}

# ============================================================
# HTTP → HTTPS Redirect
# ============================================================
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (needed for certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS Server
# ============================================================
server {
    listen 443 ssl;
    server_name _;

    # --- SSL Configuration ---
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Security Headers ---
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # --- Request Limits ---
    client_max_body_size 10m;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ========================================================
    # WebSocket — Agent Streaming
    # ========================================================
    # Must be BEFORE the general /agent/ location block
    location /agent/stream {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # Keep WebSocket alive for 24h
        proxy_send_timeout 86400s;
    }

    # ========================================================
    # AI Agent — Rate Limited
    # ========================================================
    location /agent/ {
        limit_req zone=agent_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # LLM responses can take a while
        proxy_send_timeout 120s;
    }

    # ========================================================
    # General API Proxy
    # ========================================================
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ========================================================
    # Health Check (nginx itself)
    # ========================================================
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
