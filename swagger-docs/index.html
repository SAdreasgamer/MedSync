<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedSync — API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.21.0/swagger-ui.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *::before, *::after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }

    /* Custom topbar matching MedSync brand */
    .swagger-ui .topbar { display: none; }

    .custom-header {
      background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
      padding: 20px 40px;
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .custom-header .logo {
      font-size: 32px;
      line-height: 1;
    }
    .custom-header h1 {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .custom-header p {
      margin: 4px 0 0 0;
      font-size: 13px;
      opacity: 0.8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Style tweaks */
    .swagger-ui .info { margin: 20px 0; }
    .swagger-ui .scheme-container { background: #f8f9fa; box-shadow: none; border-bottom: 1px solid #e9ecef; }
  </style>
</head>
<body>
  <div class="custom-header">
    <span class="logo">🏥</span>
    <div>
      <h1>MedSync API Documentation</h1>
      <p>Polyglot Microservices · REST · gRPC · WebSocket · OpenAPI 3.0</p>
    </div>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5.21.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.21.0/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function() {
      SwaggerUIBundle({
        url: "./medsync_openapi.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        docExpansion: "list",
        filter: true,
        tryItOutEnabled: true,
      });
    };
  </script>
</body>
</html>
